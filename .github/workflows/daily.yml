name: Portfolio Monitor

on:
  schedule:
    # ── Récap quotidien 20h Paris ─────────────────────────────────────────
    - cron: "0 18 * 4,5,6,7,8,9 *"    # avril–sept (UTC+2)
    - cron: "0 19 * 10,11,12,1,2,3 *"  # oct–mars (UTC+1)

    # ── Bilan mensuel — dernier jour du mois à 20h30 Paris ───────────────
    - cron: "30 18 28-31 4,5,6,7,8,9 *"
    - cron: "30 19 28-31 10,11,12,1,2,3 *"

    # ── Alertes intraday toutes les heures 9h–19h Paris (lun–ven) ────────
    - cron: "0 7-17 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: daily | alert | monthly"
        required: true
        default: "daily"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR_PARIS=$(TZ="Europe/Paris" date +%H)
          MIN_PARIS=$(TZ="Europe/Paris" date +%M)
          DAY=$(date +%d)
          MONTH=$(date +%m)
          LAST_DAY=$(python3 -c "import calendar,datetime; t=datetime.date.today(); print(calendar.monthrange(t.year,t.month)[1])")

          echo "Heure Paris: $HOUR_PARIS:$MIN_PARIS | Jour: $DAY/$LAST_DAY"

          # Bilan mensuel = dernier jour du mois à 20h30
          if [ "$DAY" = "$LAST_DAY" ] && [ "$HOUR_PARIS" = "20" ] && [ "$MIN_PARIS" = "30" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          elif [ "$HOUR_PARIS" = "20" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=alert" >> $GITHUB_OUTPUT
          fi

      - name: Run monitor (${{ steps.mode.outputs.mode }})
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT:    ${{ secrets.EMAIL_RECIPIENT }}
        run: python monitor.py ${{ steps.mode.outputs.mode }}
